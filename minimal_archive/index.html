<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek New Testament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Styles (same as your original) ── */
  :root {
    --parchment:      #f5f0e8;
    --parchment-dark: #ece4d0;
    --parchment-mid:  #eee8d8;
    --ink:            #1a1409;
    --ink-mid:        #3d3020;
    --ink-light:      #7a6a50;
    --red:            #8b1a1a;
    --gold:           #b8860b;
    --gold-light:     #d4a017;
    --border:         #c8b89a;
    --new-word:       #8b1a1a;
    --seen-word:      #7a6a50;
    --sidebar-w:      260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--parchment); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; font-size: 18px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
  header { position: sticky; top: 0; z-index: 200; background: var(--ink); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; border-bottom: 3px solid var(--gold); box-shadow: 0 2px 16px rgba(0,0,0,0.4); flex-wrap: wrap; }
  .header-title { font-family: 'IM Fell English', serif; font-size: 1.3rem; color: var(--gold-light); letter-spacing: 0.04em; white-space: nowrap; }
  .header-title span { font-style: italic; font-size: 0.9rem; color: #a09070; margin-left: 10px; }
  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-group { display: flex; gap: 3px; }
  .hbtn { background: transparent; border: 1px solid #3a3020; color: #8a7a60; padding: 4px 12px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .hbtn:hover { border-color: var(--gold); color: var(--gold-light); }
  .hbtn.active { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 700; }
  .hbtn:disabled { opacity: 0.3; cursor: default; }
  .nav-controls { display: flex; gap: 6px; align-items: center; }
  .verse-counter { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #a09070; min-width: 70px; text-align: center; }
  .app { display: flex; flex: 1; min-height: 0; }
  aside { width: var(--sidebar-w); min-width: var(--sidebar-w); background: #13100a; border-right: 1px solid #2a2015; overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { padding: 10px 0; border-bottom: 1px solid #2a2015; }
  .sidebar-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: #4a3f2a; padding: 4px 16px 8px; }
  .book-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; background: transparent; border: none; color: #8a7a60; padding: 6px 16px; cursor: pointer; font-family: 'Crimson Pro', serif; font-size: 0.95rem; text-align: left; transition: all 0.12s; gap: 8px; }
  .book-btn:hover { background: #1e1810; color: var(--gold-light); }
  .book-btn.active { background: #2a2015; color: var(--gold-light); font-weight: 600; }
  .book-btn.incomplete { color: #5a4f3a; }
  .book-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; padding: 1px 5px; border-radius: 2px; background: #2a2015; color: #5a4f3a; white-space: nowrap; flex-shrink: 0; }
  .book-btn.active .book-badge { background: #3a3020; color: var(--gold); }
  main { flex: 1; overflow-y: auto; min-width: 0; }
  .loading { display: flex; align-items: center; justify-content: center; height: 300px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--ink-light); letter-spacing: 0.1em; }
  #study-view { max-width: 860px; margin: 0 auto; padding: 36px 28px 80px; }
  .spread { display: none; animation: fadeIn 0.2s ease; }
  .spread.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .verse-label { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 10px; }
  .greek-block { background: var(--parchment-mid); color: var(--ink); padding: 22px 28px; font-size: 1.3rem; line-height: 2; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  /* ...rest of styles unchanged... */
  @media (max-width: 700px) {
    :root { --sidebar-w: 0px; }
    aside { display: none; }
    #full-view { padding: 32px 18px 80px; }
    .greek-block { font-size: 1.05rem; padding: 16px 16px; }
    .word-grid { grid-template-columns: 1fr; }
    .translation { grid-template-columns: 1fr; gap: 3px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    Ἑλληνική Καινή Διαθήκη
    <span>Greek New Testament</span>
  </div>
  <div class="header-controls">
    <div class="btn-group" id="mode-btns">
      <button class="hbtn active" onclick="setMode('study')" id="mode-study">Study</button>
      <button class="hbtn" onclick="setMode('full')" id="mode-full">Full Text</button>
    </div>
    <div class="nav-controls" id="nav-controls">
      <button class="hbtn" id="prevBtn" onclick="navigate(-1)">← Prev</button>
      <span class="verse-counter" id="verseCounter">— / —</span>
      <button class="hbtn" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
  </div>
</header>

<div class="app">
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">New Testament</div>
      <div id="book-list">
        <div class="loading">Loading…</div>
      </div>
    </div>
  </aside>

  <main id="main-content">
    <div id="welcome">
      <h2>Καλῶς ἦλθες</h2>
      <p>Select a book to begin reading</p>
    </div>
  </main>
</div>

<div class="progress-bar" id="progressBar"></div>

<script>
// ── State ──
let bookIndex = [];
let currentBook = null;
let currentVerse = 0;
let currentMode = 'study';
let currentTab = 'greek';

// ── Boot ──
async function init() {
  try {
    const res = await fetch('./data/index.json'); // fixed relative path
    bookIndex = await res.json();
    renderSidebar();
  } catch(e) {
    document.getElementById('book-list').innerHTML =
      '<div style="padding:16px;color:#8b1a1a;font-size:0.8rem">Could not load data/index.json<br>Run build_json.py first</div>';
  }
}

// ── Sidebar ──
function renderSidebar() {
  const el = document.getElementById('book-list');
  el.innerHTML = bookIndex.map(b => {
    const badge = b.hasTranslation ? '' : '<span class="book-badge">Greek only</span>';
    const cls   = b.hasTranslation ? '' : ' incomplete';
    return `<button class="book-btn${cls}" onclick="loadBook('${b.code}')" id="btn-${b.code}">
      ${b.name}${badge}
    </button>`;
  }).join('');
}

// ── Load book ──
async function loadBook(code) {
  document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`btn-${code}`);
  if (btn) btn.classList.add('active');

  document.getElementById('main-content').innerHTML = '<div class="loading">Loading…</div>';

  try {
    const res = await fetch(`./data/${code}.json`); // fixed relative path
    currentBook  = await res.json();
    currentVerse = 0;
    renderBook();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading">Failed to load ${code}.json</div>`;
  }
}

// ── Rest of JS unchanged (renderBook, setMode, setTab, navigate, etc.) ──
init();
</script>
</body>
</html>
